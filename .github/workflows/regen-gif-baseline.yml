name: regen-gif-baseline

# Regenerate the byte-exact GIF baseline from CI's Linux Pillow build and
# commit it back to main. Pillow's freetype is per-platform, so the canonical
# bytes can only be produced where the test runs (ubuntu-latest, x86_64).
# No untrusted github.event inputs are referenced.
#
# Iterating on this workflow? Run `make gif-fixture-update-ci-replay`
# (or `scripts/replay_regen_gif_baseline.sh`) for a local docker replay
# of the regen step so the iteration doesn't round-trip through GHA.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: uv sync
        run: uv sync --frozen --all-packages

      - name: Regenerate baseline
        run: make gif-fixture-update

      - name: Commit baseline via Contents API (signed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if git diff --quiet -- arize_phoenix/assets/session-topology.gif; then
            echo "Baseline already current; nothing to commit."
            exit 0
          fi
          BASELINE=arize_phoenix/assets/session-topology.gif
          SHA=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${BASELINE}?ref=main" --jq .sha)
          base64 -w0 "$BASELINE" > /tmp/content.b64
          jq -n \
            --arg message "viz: regenerate GIF baseline from CI Pillow build (closes #96)" \
            --rawfile content /tmp/content.b64 \
            --arg sha "$SHA" \
            --arg branch main \
            '{message:$message, content:$content, sha:$sha, branch:$branch}' \
            > /tmp/payload.json
          gh api -X PUT "repos/${GITHUB_REPOSITORY}/contents/${BASELINE}" --input /tmp/payload.json

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      # remote-write-receiver: Tempo's metrics_generator POSTs span-metrics
      # and service-graph samples here. Without this flag the receiver returns
      # 404 and the generator silently drops the writes. -- this is the
      # most-likely-to-go-wrong knob; do not remove without confirming the
      # generator is also disabled in tempo.yaml.
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms
      - --config.file=/etc/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=72h
    volumes:
      - ./prometheus.yaml:/etc/prometheus.yaml:ro
      - prom-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9090/-/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  tempo:
    image: grafana/tempo:2.6.1
    depends_on:
      prometheus:
        condition: service_healthy
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP query API (Grafana datasource talks to this)
      - "4318:4318"   # OTLP HTTP receiver (relay + LUCA peers send traces here)
      # gRPC OTLP (4317) deliberately not exposed: phoenix serve binds 4317
      # locally, and the relay uses HTTP anyway. If you stop Phoenix and want
      # gRPC ingest from elsewhere, add `- "4317:4317"`.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3200/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  grafana:
    image: grafana/grafana:11.3.1
    depends_on:
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    environment:
      # Anonymous admin so the operator can land directly on the Explore tab
      # with no login dance. This is a local-only dev stack.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # Feature toggles unlock TraceQL UI features that aren't on by default
      # in 11.x. `metricsSummary` lights up the per-span metrics-summary tab
      # in Tempo's Explore view; `traceQLStreaming` streams partial results
      # from `metrics_generator.local_blocks` so query feedback isn't all-or-
      # nothing on slow queries.
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor traceQLStreaming metricsSummary traceqlSearch"
      # Default home dashboard so the operator lands on the o2r overview
      # instead of Grafana's empty starter page.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/o2r-overview.json"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  tempo-data:
  grafana-data:
  prom-data:

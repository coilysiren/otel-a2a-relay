- nasa_id: iss029e012564
  filename: iss029e012564.jpg
  title: Aurora Borealis and city lights on the horizon  taken by the Expedition 29
    crew
  description: 'ISS029-E-012564 (29 Sept. 2011) --- The Midwestern United States at
    night with Aurora Borealis is featured in this image photographed by an Expedition
    29 crew member on the International Space Station. The night skies viewed from
    the space station are illuminated with light from many sources. For example, the
    Midwestern United States presents a night-time appearance not unlike a patchwork
    quilt when viewed from orbit. The artificial light from human settlements appears
    everywhere with a characteristic yellow tinge in this photograph. But green light
    of the Aurora Borealis also appears strongly in this view (top left)—even seeming
    to be reflected off Earth’s surface—in Canada—beneath the aurora. A small white
    patch of light is almost certainly lightning from a storm on the East coast (top
    right). Part of the International Space Station appears across the top of the
    image. This photograph highlights the Chicago, IL, metropolitan area as the largest
    cluster of lights at center, next to the dark patch of Lake Michigan. The other
    largest metropolitan areas include St. Louis, MO (lower right), Minneapolis–St.
    Paul, MN (left) and the Omaha–Council Bluffs region on the Nebraska–Iowa border
    (lower left). City light clusters give an immediate sense of relative city size;
    demographers have used night time satellite imagery to make estimates of city
    populations, especially in the developing world where city growth can be very
    rapid. The U.S. northeast seaboard lies in the most oblique (meaning viewed at
    an angle) part of the image at top right, just beyond the Appalachian Mts., a
    dark winding zone without major cities. Scales change significantly in oblique
    views: Omaha is only 200 kilometers from Des Moines, but appears roughly the same
    distance from Minneapolis—which is actually 375 kilometers to the north of Des
    Moines. In addition to the major metropolitan areas, the rectangular NS/EW-oriented
    pattern of townships is clearly visible in the rural, lower left part of the image.
    This pattern instantly gives the sense of north orientation (toward the top left
    corner) and is a distinctive characteristic of the United States, so that ISS
    crew members can quickly know which continent they are flying over even at night.
    In contrast to the regular township pattern, interstate highways converge on St.
    Louis (e.g. Hwy 44), Chicago and other large cities, much like wheel spokes around
    a central hub. Rivers—major visual features in daylight—become almost invisible
    at night. The course of the Mississippi River appears as a slightly meandering
    zone from Minneapolis through St. Louis (dashed line)—the river course continues
    out of the lower right corner of the image.'
  credit: JSC
  date_created: '2011-09-29T00:00:00Z'
  keywords: []
  source_image_url: http://images-assets.nasa.gov/image/iss029e012564/iss029e012564~large.jpg
  source_metadata_url: https://images.nasa.gov/details-iss029e012564

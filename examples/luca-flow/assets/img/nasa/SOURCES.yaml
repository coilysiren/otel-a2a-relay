- nasa_id: GSFC_20171208_Archive_e001111
  filename: GSFC_20171208_Archive_e001111.jpg
  title: Magnetospheric Multiscale (MMS)
  description: 'MMS Spacecraft Animation  The Magnetospheric Multiscale (MMS) mission
    is a Solar Terrestrial Probes mission comprising four identically instrumented
    spacecraft that will use Earth''s magnetosphere as a laboratory to study the microphysics
    of three fundamental plasma processes: magnetic reconnection, energetic particle
    acceleration, and turbulence. These processes occur in all astrophysical plasma
    systems but can be studied in situ only in our solar system and most efficiently
    only in Earth''s magnetosphere, where they control the dynamics of the geospace
    environment and play an important role in the processes known as &quot;space weather.&quot;  Learn
    more about MMS at <a href="http://www.nasa.gov/mms" rel="nofollow">www.nasa.gov/mms</a>   Learn
    more about MMS at <a href="http://www.nasa.gov/mms" rel="nofollow">www.nasa.gov/mms</a>   Credit
    NASA/Chris Gunn  The Magnetospheric Multiscale, or MMS, will study how the sun
    and the Earth''s magnetic fields connect and disconnect, an explosive process
    that can accelerate particles through space to nearly the speed of light. This
    process is called magnetic reconnection and can occur throughout all space.   <b><a
    href="http://www.nasa.gov/audience/formedia/features/MP_Photo_Guidelines.html"
    rel="nofollow">NASA image use policy.</a></b>  <b><a href="http://www.nasa.gov/centers/goddard/home/index.html"
    rel="nofollow">NASA Goddard Space Flight Center</a></b> enables NASA’s mission
    through four scientific endeavors: Earth Science, Heliophysics, Solar System Exploration,
    and Astrophysics. Goddard plays a leading role in NASA’s accomplishments by contributing
    compelling scientific knowledge to advance the Agency’s mission.  <b>Follow us
    on <a href="http://twitter.com/NASAGoddardPix" rel="nofollow">Twitter</a></b>  <b>Like
    us on <a href="http://www.facebook.com/pages/Greenbelt-MD/NASA-Goddard/395013845897?ref=tsd"
    rel="nofollow">Facebook</a></b>  <b>Find us on <a href="http://instagram.com/nasagoddard?vm=grid"
    rel="nofollow">Instagram</a></b>'
  credit: GSFC
